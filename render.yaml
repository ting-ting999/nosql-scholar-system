services:
  - type: web
    name: nosql-scholar-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/build_vector_index.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
